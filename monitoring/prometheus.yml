global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    project: fleetstream

scrape_configs:
  # FastAPI — métriques HTTP + métriques fleet custom
  - job_name: fleetstream-api
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics

  # Redpanda — métriques Kafka/broker internes
  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /metrics
