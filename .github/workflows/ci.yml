name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r driver_ingest/requirements.txt
          pip install -r context_poller/requirements.txt
          pip install -r hot_path/requirements.txt
          pip install -r cold_path/requirements.txt
          pip install -r tlc_replay/requirements.txt
          pip install -r api/requirements.txt

      - name: Lint
        run: |
          ruff check driver_ingest context_poller hot_path cold_path tlc_replay api copilot_features ml tests scripts schemas/register_schemas.py

      - name: Unit tests
        run: |
          pytest -q

  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r driver_ingest/requirements.txt
          pip install -r context_poller/requirements.txt
          pip install -r hot_path/requirements.txt
          pip install -r cold_path/requirements.txt
          pip install -r tlc_replay/requirements.txt
          pip install -r api/requirements.txt

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Smoke E2E
        run: |
          python scripts/smoke-e2e.py --url http://localhost:8001 --timeout 240 --score-requests 100 --score-concurrency 10

      - name: Perf Lot 4
        run: |
          python scripts/perf-lot4.py --url http://localhost:8001 --ingest-window 8 --score-requests 120 --score-concurrency 12

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose logs --no-color --tail=200

      - name: Shutdown stack
        if: always()
        run: |
          docker compose down -v
