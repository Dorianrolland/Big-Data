version: "3.9"

# ── Shared env blocks ──────────────────────────────────────────────────────────
x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_TOPIC: livreurs-gps

x-common-env: &common-env
  <<: *kafka-env
  REDIS_URL: redis://redis:6379

services:

  # ────────────────────────────────────────────────────────────────────────────
  # Message Broker — Redpanda (Kafka-compatible, sans Zookeeper, ultra-léger)
  # ────────────────────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr       internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr  internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr         redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode             dev-container
      - --smp              2
      - --memory           512M
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka externe (accès depuis l'hôte)
      - "18082:18082"   # Pandaproxy REST
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API / métriques Prometheus
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Interface web Redpanda — visualisation des topics en live
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.6
    container_name: fleetstream-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"

  # Initialisation du topic (tourne une fois, puis s'arrête)
  redpanda-init:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    # || true : idempotent — pas d'erreur si le topic existe déjà
    command:
      - "rpk topic create livreurs-gps --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true && echo '✓ Topic livreurs-gps prêt'"
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # In-Memory Store — Redis Stack (GEO + JSON + Search intégrés)
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: fleetstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Producer — Simulation 100 livreurs dans Paris (asyncio)
  # ────────────────────────────────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: fleetstream-producer
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      NUM_LIVREURS: "${NUM_LIVREURS:-100}"
      EMIT_INTERVAL_MS: "${EMIT_INTERVAL_MS:-1000}"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Hot Consumer — Speed Layer → Redis GEOADD (TTL 30s)
  # ────────────────────────────────────────────────────────────────────────────
  hot-consumer:
    build:
      context: ./hot_path
      dockerfile: Dockerfile
    container_name: fleetstream-hot
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      GPS_TTL_SECONDS: "${GPS_TTL_SECONDS:-30}"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Cold Consumer — Batch Layer → Parquet Snappy (hive-partitionné)
  # ────────────────────────────────────────────────────────────────────────────
  cold-consumer:
    build:
      context: ./cold_path
      dockerfile: Dockerfile
    container_name: fleetstream-cold
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      DATA_PATH: /data/parquet
      BATCH_INTERVAL_SECONDS: "${BATCH_INTERVAL_SECONDS:-60}"
      MAX_BATCH_RECORDS: "${MAX_BATCH_RECORDS:-50000}"
    volumes:
      - ./data:/data
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # API — Serving Layer (Hot Path Redis + Cold Path DuckDB + Prometheus /metrics)
  # ────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fleetstream-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DATA_PATH: /data/parquet
    volumes:
      - ./data:/data
    ports:
      - "8001:8000"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Dashboard — Streamlit live map (pydeck + auto-refresh 2s)
  # ────────────────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: fleetstream-dashboard
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      REFRESH_SECONDS: "2"
    ports:
      - "8501:8501"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # RedisInsight — GUI Redis (visualisation des clés GEO et hashes)
  # ────────────────────────────────────────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: fleetstream-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Prometheus — Scrape API (/metrics) + Redpanda (port 9644)
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: fleetstream-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Grafana — Dashboard auto-provisionné (datasource + dashboard JSON)
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: fleetstream-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: fleetstream
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/fleetstream.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redpanda_data:
  redis_data:
  redisinsight_data:
  prometheus_data:
  grafana_data:
