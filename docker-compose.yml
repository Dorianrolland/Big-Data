
x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_TOPIC: livreurs-gps
  ORDER_OFFERS_TOPIC: order-offers-v1
  ORDER_EVENTS_TOPIC: order-events-v1
  CONTEXT_SIGNALS_TOPIC: context-signals-v1

x-common-env: &common-env
  <<: *kafka-env
  REDIS_URL: redis://redis:6379

services:
  redpanda:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "2"
      - --memory
      - 512M
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.6
    container_name: fleetstream-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"

  redpanda-init:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        rpk topic create livreurs-gps --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create order-offers-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create order-events-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create context-signals-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && echo 'topics ready'
    restart: "no"

  schema-init:
    image: python:3.12-slim
    container_name: fleetstream-schema-init
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    volumes:
      - ./schemas:/schemas:ro
    command:
      - /bin/sh
      - -c
      - >-
        pip install --no-cache-dir requests==2.32.3 &&
        python /schemas/register_schemas.py --registry http://redpanda:8081 --proto /schemas/copilot_events.proto
    restart: "no"

  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: fleetstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: fleetstream-producer
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      NUM_LIVREURS: "${NUM_LIVREURS:-300}"
      EMIT_INTERVAL_MS: "${EMIT_INTERVAL_MS:-1000}"
      OFFER_PROBABILITY: "${OFFER_PROBABILITY:-0.14}"
    restart: unless-stopped

  hot-consumer:
    build:
      context: ./hot_path
      dockerfile: Dockerfile
    container_name: fleetstream-hot
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      GPS_TTL_SECONDS: "${GPS_TTL_SECONDS:-30}"
    restart: unless-stopped

  cold-consumer:
    build:
      context: ./cold_path
      dockerfile: Dockerfile
    container_name: fleetstream-cold
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      DATA_PATH: /data/parquet
      EVENTS_PATH: /data/parquet_events
      BATCH_INTERVAL_SECONDS: "${BATCH_INTERVAL_SECONDS:-60}"
      MAX_BATCH_RECORDS: "${MAX_BATCH_RECORDS:-50000}"
    volumes:
      - ./data:/data
    restart: unless-stopped

  copilot-features:
    build:
      context: ./copilot_features
      dockerfile: Dockerfile
    container_name: fleetstream-copilot-features
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      COPILOT_OFFER_TTL_SECONDS: "${COPILOT_OFFER_TTL_SECONDS:-21600}"
      COPILOT_MAX_OFFERS_PER_DRIVER: "${COPILOT_MAX_OFFERS_PER_DRIVER:-100}"
      FUEL_COST_EUR_PER_KM: "${FUEL_COST_EUR_PER_KM:-0.35}"
    restart: unless-stopped

  tlc-replay:
    build:
      context: ./tlc_replay
      dockerfile: Dockerfile
    container_name: fleetstream-tlc-replay
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      TLC_DATA_DIR: /data/tlc
      TLC_MONTH: "${TLC_MONTH:-2024-01}"
      TLC_BASE_URL: "${TLC_BASE_URL:-https://d37ci6vzurychx.cloudfront.net/trip-data}"
      TLC_LICENSE_FILTER: "${TLC_LICENSE_FILTER:-HV0003}"
      TLC_SPEED_FACTOR: "${TLC_SPEED_FACTOR:-60}"
      TLC_BATCH_SIZE: "${TLC_BATCH_SIZE:-500}"
      TLC_LOOP_ON_FINISH: "${TLC_LOOP_ON_FINISH:-true}"
    volumes:
      - ./data:/data
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fleetstream-api
    depends_on:
      redis:
        condition: service_healthy
      copilot-features:
        condition: service_started
    environment:
      <<: *common-env
      DATA_PATH: /data/parquet
      EVENTS_PATH: /data/parquet_events
      MODEL_PATH: /data/models/copilot_model.joblib
      COPILOT_MODEL_MIN_ROWS: "${COPILOT_MODEL_MIN_ROWS:-300}"
      COPILOT_MODEL_MIN_AUC: "${COPILOT_MODEL_MIN_AUC:-0.62}"
      COPILOT_MODEL_MIN_AVG_PRECISION: "${COPILOT_MODEL_MIN_AVG_PRECISION:-0.45}"
      OSRM_URL: "${OSRM_URL:-http://osrm:5000}"
    volumes:
      - ./data:/data
    ports:
      - "8001:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: fleetstream-dashboard
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      REFRESH_SECONDS: "2"
    ports:
      - "8501:8501"
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: fleetstream-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped

  osrm:
    image: osrm/osrm-backend:v5.27.1
    container_name: fleetstream-osrm
    command: osrm-routed --algorithm mld /data/new-york-latest.osrm --max-table-size 100
    volumes:
      - ./data/osrm:/data:ro
    ports:
      - "5000:5000"
    profiles:
      - routing
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: fleetstream-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fleetstream-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: fleetstream
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/fleetstream.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redpanda_data:
  redis_data:
  redisinsight_data:
  prometheus_data:
  grafana_data:
