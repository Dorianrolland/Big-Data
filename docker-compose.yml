
x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
  KAFKA_TOPIC: livreurs-gps
  ORDER_OFFERS_TOPIC: order-offers-v1
  ORDER_EVENTS_TOPIC: order-events-v1
  CONTEXT_SIGNALS_TOPIC: context-signals-v1

x-common-env: &common-env
  <<: *kafka-env
  REDIS_URL: redis://redis:6379

services:
  redpanda:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --mode
      - dev-container
      - --smp
      - "2"
      - --memory
      - 512M
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.6
    container_name: fleetstream-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "8080:8080"
    restart: unless-stopped

  redpanda-init:
    image: redpandadata/redpanda:v23.3.18
    container_name: fleetstream-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        rpk topic create livreurs-gps --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create order-offers-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create order-events-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && rpk topic create context-signals-v1 --brokers redpanda:9092 --partitions 3 --replicas 1 --topic-config retention.ms=86400000 --topic-config compression.type=lz4 || true
        && echo 'topics ready'
    restart: "no"

  schema-init:
    image: python:3.12-slim
    container_name: fleetstream-schema-init
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    volumes:
      - ./schemas:/schemas:ro
    command:
      - /bin/sh
      - -c
      - >-
        pip install --no-cache-dir requests==2.32.3 &&
        python /schemas/register_schemas.py --registry http://redpanda:8081 --proto /schemas/copilot_events.proto
    restart: "no"

  redis:
    image: redis/redis-stack-server:7.2.0-v10
    container_name: fleetstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  hot-consumer:
    build:
      context: ./hot_path
      dockerfile: Dockerfile
    container_name: fleetstream-hot
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      GPS_TTL_SECONDS: "${GPS_TTL_SECONDS:-30}"
    restart: unless-stopped

  cold-consumer:
    build:
      context: ./cold_path
      dockerfile: Dockerfile
    container_name: fleetstream-cold
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      DATA_PATH: /data/parquet
      EVENTS_PATH: /data/parquet_events
      BATCH_INTERVAL_SECONDS: "${BATCH_INTERVAL_SECONDS:-60}"
      MAX_BATCH_RECORDS: "${MAX_BATCH_RECORDS:-50000}"
    volumes:
      - ./data:/data
    restart: unless-stopped

  copilot-features:
    build:
      context: ./copilot_features
      dockerfile: Dockerfile
    container_name: fleetstream-copilot-features
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      COPILOT_OFFER_TTL_SECONDS: "${COPILOT_OFFER_TTL_SECONDS:-21600}"
      COPILOT_MAX_OFFERS_PER_DRIVER: "${COPILOT_MAX_OFFERS_PER_DRIVER:-100}"
      FUEL_COST_EUR_PER_KM: "${FUEL_COST_EUR_PER_KM:-0.35}"
    restart: unless-stopped

  tlc-replay:
    build:
      context: ./tlc_replay
      dockerfile: Dockerfile
    container_name: fleetstream-tlc-replay
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      TLC_DATA_DIR: /data/tlc
      TLC_MONTH: "${TLC_MONTH:-2024-01}"
      TLC_MONTHS: "${TLC_MONTHS:-}"
      TLC_MONTH_COUNT: "${TLC_MONTH_COUNT:-0}"
      TLC_BASE_URL: "${TLC_BASE_URL:-https://d37ci6vzurychx.cloudfront.net/trip-data}"
      TLC_LICENSE_FILTER: "${TLC_LICENSE_FILTER:-HV0003}"
      TLC_SPEED_FACTOR: "${TLC_SPEED_FACTOR:-1}"
      TLC_TICK_INTERVAL_SEC: "${TLC_TICK_INTERVAL_SEC:-5}"
      TLC_TRIP_SAMPLE_RATE: "${TLC_TRIP_SAMPLE_RATE:-0.15}"
      TLC_MAX_ACTIVE_TRIPS: "${TLC_MAX_ACTIVE_TRIPS:-800}"
      TLC_LOOP_ON_FINISH: "${TLC_LOOP_ON_FINISH:-true}"
      TLC_SCENARIO: "${TLC_SCENARIO:-single_driver}"
      TLC_SINGLE_DRIVER_ID: "${TLC_SINGLE_DRIVER_ID:-drv_demo_001}"
      TLC_TRAIN_MONTH_COUNT: "${TLC_TRAIN_MONTH_COUNT:-10}"
      TLC_LIVE_MONTH_COUNT: "${TLC_LIVE_MONTH_COUNT:-2}"
      TLC_RESET_RUNTIME_ON_START: "${TLC_RESET_RUNTIME_ON_START:-true}"
      TLC_NIGHT_ACCEL_START: "${TLC_NIGHT_ACCEL_START:-02:00}"
      TLC_NIGHT_ACCEL_END: "${TLC_NIGHT_ACCEL_END:-08:00}"
      TLC_NIGHT_ACCEL_FACTOR: "${TLC_NIGHT_ACCEL_FACTOR:-8}"
      TLC_LUNCH_BREAK_ENABLED: "${TLC_LUNCH_BREAK_ENABLED:-true}"
      TLC_LUNCH_BREAK_WINDOW: "${TLC_LUNCH_BREAK_WINDOW:-12:00-14:00}"
      TLC_LUNCH_BREAK_MIN: "${TLC_LUNCH_BREAK_MIN:-20}"
      TLC_LUNCH_BREAK_MAX: "${TLC_LUNCH_BREAK_MAX:-45}"
      TLC_ROUTE_MODE: "${TLC_ROUTE_MODE:-osrm}"
      TLC_ROUTE_OSRM_URL: "${TLC_ROUTE_OSRM_URL:-http://osrm:5000}"
      TLC_ROUTE_OSRM_FALLBACK_URL: "${TLC_ROUTE_OSRM_FALLBACK_URL:-https://router.project-osrm.org}"
      TLC_ROUTE_OSRM_TIMEOUT_S: "${TLC_ROUTE_OSRM_TIMEOUT_S:-4.0}"
      TLC_ROUTE_FETCH_TIMEOUT_S: "${TLC_ROUTE_FETCH_TIMEOUT_S:-0.7}"
      TLC_ROUTE_PREFETCH_ENABLED: "${TLC_ROUTE_PREFETCH_ENABLED:-true}"
      TLC_ROUTE_PREFETCH_MAX_PENDING: "${TLC_ROUTE_PREFETCH_MAX_PENDING:-256}"
      TLC_ROUTE_PREFETCH_MAX_CONCURRENCY: "${TLC_ROUTE_PREFETCH_MAX_CONCURRENCY:-8}"
      TLC_ROUTE_CACHE_MAX: "${TLC_ROUTE_CACHE_MAX:-4096}"
      ROUTING_PROVIDERS: "${ROUTING_PROVIDERS:-public,osrm_public,osrm}"
      ROUTING_PUBLIC_PROVIDER: "${ROUTING_PUBLIC_PROVIDER:-openrouteservice}"
      ROUTING_PUBLIC_API_KEY: "${ROUTING_PUBLIC_API_KEY:-}"
      ROUTING_PUBLIC_BASE_URL: "${ROUTING_PUBLIC_BASE_URL:-https://api.openrouteservice.org}"
      ROUTING_OSRM_URL: "${ROUTING_OSRM_URL:-http://osrm:5000}"
      ROUTING_OSRM_PUBLIC_URL: "${ROUTING_OSRM_PUBLIC_URL:-https://router.project-osrm.org}"
    volumes:
      - ./data:/data
    restart: unless-stopped

  driver-ingest:
    build:
      context: ./driver_ingest
      dockerfile: Dockerfile
    container_name: fleetstream-driver-ingest
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      DRIVER_INGEST_TOKEN: "${DRIVER_INGEST_TOKEN:-dev-insecure-token}"
      DRIVER_INGEST_RATE_LIMIT_PER_MIN: "${DRIVER_INGEST_RATE_LIMIT_PER_MIN:-1800}"
      DRIVER_INGEST_MAX_BATCH_SIZE: "${DRIVER_INGEST_MAX_BATCH_SIZE:-200}"
      DRIVER_INGEST_COMPRESSION: "${DRIVER_INGEST_COMPRESSION:-gzip}"
    ports:
      - "8010:8000"
    restart: unless-stopped

  context-poller:
    build:
      context: ./context_poller
      dockerfile: Dockerfile
    container_name: fleetstream-context-poller
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    environment:
      <<: *common-env
      CONTEXT_TICK_SECONDS: "${CONTEXT_TICK_SECONDS:-30}"
      GBFS_POLL_SECONDS: "${GBFS_POLL_SECONDS:-60}"
      WEATHER_POLL_SECONDS: "${WEATHER_POLL_SECONDS:-600}"
      NYC311_POLL_SECONDS: "${NYC311_POLL_SECONDS:-300}"
      EVENTS_POLL_SECONDS: "${EVENTS_POLL_SECONDS:-600}"
      DOT_ADVISORY_POLL_SECONDS: "${DOT_ADVISORY_POLL_SECONDS:-1800}"
      DOT_SPEEDS_POLL_SECONDS: "${DOT_SPEEDS_POLL_SECONDS:-300}"
      COURIER_GEO_KEY: "${COURIER_GEO_KEY:-fleet:geo}"
      CONTEXT_QUALITY_KEY: "${CONTEXT_QUALITY_KEY:-copilot:context:quality}"
      CONTEXT_QUALITY_TTL_SECONDS: "${CONTEXT_QUALITY_TTL_SECONDS:-7200}"
      CONTEXT_QUALITY_WINDOW_CYCLES: "${CONTEXT_QUALITY_WINDOW_CYCLES:-10}"
      CONTEXT_SUPPLY_VARIANCE_EPSILON: "${CONTEXT_SUPPLY_VARIANCE_EPSILON:-0.03}"
      CONTEXT_SUPPLY_FLAT_MIN_CYCLES: "${CONTEXT_SUPPLY_FLAT_MIN_CYCLES:-6}"
      EVENTS_CONTEXT_KEY: "${EVENTS_CONTEXT_KEY:-copilot:context:events}"
      EVENTS_CONTEXT_TTL_SECONDS: "${EVENTS_CONTEXT_TTL_SECONDS:-1800}"
      NYC_EVENTS_URL: "${NYC_EVENTS_URL:-https://data.cityofnewyork.us/resource/tvpp-9vvx.json}"
      NYC_DOT_WEEKLY_ADVISORY_URL: "${NYC_DOT_WEEKLY_ADVISORY_URL:-https://www.nyc.gov/html/dot/html/motorist/weektraf.shtml}"
      NYC_DOT_SPEEDS_URL: "${NYC_DOT_SPEEDS_URL:-https://linkdata.nyctmc.org/data/LinkSpeedQuery.txt}"
      TRAFFIC_CLOSURE_RADIUS_KM: "${TRAFFIC_CLOSURE_RADIUS_KM:-4.5}"
      TRAFFIC_SPEED_RADIUS_KM: "${TRAFFIC_SPEED_RADIUS_KM:-3.5}"
      TRAFFIC_CLOSURE_LOOKAHEAD_HOURS: "${TRAFFIC_CLOSURE_LOOKAHEAD_HOURS:-72}"
      TRAFFIC_CLOSURE_POST_WINDOW_MINUTES: "${TRAFFIC_CLOSURE_POST_WINDOW_MINUTES:-240}"
      TRAFFIC_CLOSURE_PRESSURE_SCALE: "${TRAFFIC_CLOSURE_PRESSURE_SCALE:-0.32}"
      TRAFFIC_CLOSURE_PRESSURE_CAP: "${TRAFFIC_CLOSURE_PRESSURE_CAP:-0.55}"
      TRAFFIC_SPEED_BASELINE_KMH: "${TRAFFIC_SPEED_BASELINE_KMH:-38}"
      TRAFFIC_SPEED_INPUT_UNIT: "${TRAFFIC_SPEED_INPUT_UNIT:-mph}"
      TRAFFIC_SPEED_PRESSURE_SCALE: "${TRAFFIC_SPEED_PRESSURE_SCALE:-0.55}"
      TRAFFIC_SPEED_PRESSURE_CAP: "${TRAFFIC_SPEED_PRESSURE_CAP:-0.45}"
      TRAFFIC_FACTOR_CAP: "${TRAFFIC_FACTOR_CAP:-2.4}"
      EVENT_RADIUS_KM: "${EVENT_RADIUS_KM:-4.5}"
      EVENT_LOOKAHEAD_HOURS: "${EVENT_LOOKAHEAD_HOURS:-6}"
      EVENT_POST_WINDOW_MINUTES: "${EVENT_POST_WINDOW_MINUTES:-60}"
      EVENT_PRESSURE_SCALE: "${EVENT_PRESSURE_SCALE:-0.55}"
      EVENT_PRESSURE_CAP: "${EVENT_PRESSURE_CAP:-0.75}"
      DEMAND_INDEX_CAP: "${DEMAND_INDEX_CAP:-3.2}"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fleetstream-api
    depends_on:
      redis:
        condition: service_healthy
      copilot-features:
        condition: service_started
      tlc-replay:
        condition: service_started
    environment:
      <<: *common-env
      DATA_PATH: /data/parquet
      EVENTS_PATH: /data/parquet_events
      MODEL_PATH: /data/models/copilot_model.joblib
      REDIS_CONNECT_TIMEOUT_SECONDS: "${REDIS_CONNECT_TIMEOUT_SECONDS:-1.5}"
      REDIS_OP_TIMEOUT_SECONDS: "${REDIS_OP_TIMEOUT_SECONDS:-6.0}"
      DUCKDB_QUERY_TIMEOUT_SECONDS: "${DUCKDB_QUERY_TIMEOUT_SECONDS:-12.0}"
      COPILOT_DUCKDB_QUERY_TIMEOUT_SECONDS: "${COPILOT_DUCKDB_QUERY_TIMEOUT_SECONDS:-8.0}"
      ANALYTICS_COLD_QUERY_TIMEOUT_SECONDS: "${ANALYTICS_COLD_QUERY_TIMEOUT_SECONDS:-4.0}"
      FOCUS_TRAIL_LOOKBACK_MIN: "${FOCUS_TRAIL_LOOKBACK_MIN:-45}"
      FOCUS_TRAIL_MAX_HOURS: "${FOCUS_TRAIL_MAX_HOURS:-2}"
      FOCUS_TRAIL_QUERY_TIMEOUT_SECONDS: "${FOCUS_TRAIL_QUERY_TIMEOUT_SECONDS:-3.0}"
      STATS_STATUS_SCAN_LIMIT: "${STATS_STATUS_SCAN_LIMIT:-1500}"
      STATS_COLD_CACHE_TTL_SECONDS: "${STATS_COLD_CACHE_TTL_SECONDS:-45.0}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      COPILOT_REPLAY_EVENT_TOPICS: "${COPILOT_REPLAY_EVENT_TOPICS:-order-events-v1,order-offers-v1}"
      COPILOT_REPLAY_DEFAULT_LIMIT: "${COPILOT_REPLAY_DEFAULT_LIMIT:-300}"
      COPILOT_REPLAY_MAX_LIMIT: "${COPILOT_REPLAY_MAX_LIMIT:-2000}"
      COPILOT_REPLAY_HARD_LIMIT: "${COPILOT_REPLAY_HARD_LIMIT:-5000}"
      COPILOT_REPLAY_MAX_RANGE_HOURS: "${COPILOT_REPLAY_MAX_RANGE_HOURS:-24}"
      COPILOT_REPLAY_MAX_RANGE_NO_DRIVER_HOURS: "${COPILOT_REPLAY_MAX_RANGE_NO_DRIVER_HOURS:-3}"
      COPILOT_REPLAY_SOURCE_LIMIT_FACTOR: "${COPILOT_REPLAY_SOURCE_LIMIT_FACTOR:-4}"
      COPILOT_REPLAY_SOURCE_LIMIT_MIN: "${COPILOT_REPLAY_SOURCE_LIMIT_MIN:-200}"
      COPILOT_REPLAY_SOURCE_LIMIT_CAP: "${COPILOT_REPLAY_SOURCE_LIMIT_CAP:-12000}"
      COPILOT_REPLAY_COLUMN_CACHE_TTL_SECONDS: "${COPILOT_REPLAY_COLUMN_CACHE_TTL_SECONDS:-45}"
      COPILOT_REPLAY_COLUMN_CACHE_MAX: "${COPILOT_REPLAY_COLUMN_CACHE_MAX:-256}"
      COPILOT_MODEL_MIN_ROWS: "${COPILOT_MODEL_MIN_ROWS:-300}"
      COPILOT_MODEL_MIN_AUC: "${COPILOT_MODEL_MIN_AUC:-0.62}"
      COPILOT_MODEL_MIN_AVG_PRECISION: "${COPILOT_MODEL_MIN_AVG_PRECISION:-0.45}"
      OSRM_URL: "${OSRM_URL:-http://osrm:5000}"
      TLC_SCENARIO: "${TLC_SCENARIO:-single_driver}"
      TLC_SINGLE_DRIVER_ID: "${TLC_SINGLE_DRIVER_ID:-drv_demo_001}"
    volumes:
      - ./data:/data
    ports:
      - "8001:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: fleetstream-dashboard
    depends_on:
      - api
    environment:
      API_URL: http://api:8000
      REFRESH_SECONDS: "${DASHBOARD_REFRESH_SECONDS:-8}"
    ports:
      - "8501:8501"
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: fleetstream-redisinsight
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    restart: unless-stopped

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: fleetstream-osrm
    command: osrm-routed --algorithm mld /data/new-york-latest.osrm --max-table-size 100
    volumes:
      - ./data/osrm:/data:ro
    ports:
      - "5000:5000"
    profiles:
      - routing
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: fleetstream-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fleetstream-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: fleetstream
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/fleetstream.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  redpanda_data:
  redis_data:
  redisinsight_data:
  prometheus_data:
  grafana_data:
